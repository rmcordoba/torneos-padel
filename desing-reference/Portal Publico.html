<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Club Pádel Buenos Aires — Portal de Torneos</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: "DM Sans", sans-serif; background: #f1f5f9; color: #1e293b; -webkit-font-smoothing: antialiased; }
    #root { min-height: 100vh; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

    @keyframes fadeUp   { from { opacity:0; transform:translateY(14px) } to { opacity:1; transform:translateY(0) } }
    @keyframes fadeIn   { from { opacity:0 } to { opacity:1 } }
    @keyframes slideUp  { from { opacity:0; transform:translateY(32px) } to { opacity:1; transform:translateY(0) } }
    @keyframes pulse    { 0%,100%{opacity:1} 50%{opacity:.4} }
    @keyframes spin     { to { transform: rotate(360deg) } }

    .fade-up  { animation: fadeUp  .28s cubic-bezier(.22,1,.36,1) forwards; }
    .fade-in  { animation: fadeIn  .2s ease forwards; }
    .slide-up { animation: slideUp .32s cubic-bezier(.22,1,.36,1) forwards; }

    /* Cards hover */
    .card-hover { transition: box-shadow .15s, border-color .15s, transform .15s; }
    .card-hover:hover { box-shadow: 0 8px 28px rgba(0,0,0,0.1); border-color: #bbf7d0 !important; transform: translateY(-1px); }

    /* Mobile */
    @media (max-width: 640px) {
      .hide-sm { display: none !important; }
      .grid-1-sm { grid-template-columns: 1fr !important; }
      .px-sm { padding-left: 16px !important; padding-right: 16px !important; }
      .text-sm-sm { font-size: 13px !important; }
      .h1-sm { font-size: 26px !important; }
    }
    @media (max-width: 900px) {
      .hide-md { display: none !important; }
      .grid-2-md { grid-template-columns: 1fr 1fr !important; }
    }

    /* Overlay */
    .overlay-bg {
      position: fixed; inset: 0; background: rgba(15,23,42,0.7);
      backdrop-filter: blur(6px); z-index: 1000;
      display: flex; align-items: center; justify-content: center;
      padding: 16px; animation: fadeIn .2s ease;
    }
    .overlay-card {
      background: #fff; border-radius: 20px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.25);
      width: 100%; overflow: hidden;
      animation: slideUp .28s cubic-bezier(.22,1,.36,1);
    }
  </style>
</head>
<body>
<div id="root"></div>
<script src="padel-data.js"></script>
<script src="padel-data2.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ─── DESIGN TOKENS ────────────────────────────────────────────────────────────
const G  = "#16a34a";
const GL = "#f0fdf4";
const GB = "#dcfce7";
const GD = "#15803d";
const MAX = 1140;

// ─── SHARED ATOMS ─────────────────────────────────────────────────────────────
const Badge = ({ estado }) => {
  const m = {
    activo:        { l:"En curso",       bg:"#dcfce7", c:G,         dot:true  },
    inscripciones: { l:"Inscripciones",  bg:"#dbeafe", c:"#2563eb", dot:false },
    finalizado:    { l:"Finalizado",     bg:"#f1f5f9", c:"#64748b", dot:false },
    abierta:       { l:"Abierta",        bg:"#dcfce7", c:G,         dot:false },
    llena:         { l:"Llena",          bg:"#fee2e2", c:"#dc2626", dot:false },
    cerrada:       { l:"Cerrada",        bg:"#f1f5f9", c:"#64748b", dot:false },
    en_curso:      { l:"En curso",       bg:"#dcfce7", c:G,         dot:true  },
    jugado:        { l:"Jugado",         bg:"#f1f5f9", c:"#94a3b8", dot:false },
    programado:    { l:"Próximo",        bg:"#dbeafe", c:"#3b82f6", dot:false },
  };
  const s = m[estado] || { l:estado, bg:"#f1f5f9", c:"#64748b", dot:false };
  return (
    <span style={{ display:"inline-flex", alignItems:"center", gap:5,
      padding:"3px 10px", borderRadius:20, fontSize:11, fontWeight:700,
      letterSpacing:"0.04em", textTransform:"uppercase",
      background:s.bg, color:s.c }}>
      {s.dot && <span style={{ width:6, height:6, borderRadius:"50%", background:s.c, animation:"pulse 1.4s infinite", display:"inline-block" }} />}
      {s.l}
    </span>
  );
};

const Progress = ({ value, max, h=6 }) => {
  const pct = max > 0 ? Math.min(100, Math.round(value/max*100)) : 0;
  return (
    <div style={{ display:"flex", alignItems:"center", gap:8 }}>
      <div style={{ flex:1, height:h, background:"#e2e8f0", borderRadius:h, overflow:"hidden" }}>
        <div style={{ height:"100%", width:`${pct}%`, borderRadius:h,
          background: pct>=100 ? "#dc2626" : pct>75 ? "#f97316" : G,
          transition:"width .5s" }} />
      </div>
      <span style={{ fontSize:11, color:"#94a3b8", minWidth:40, textAlign:"right" }}>{value}/{max}</span>
    </div>
  );
};

const Btn = ({ children, variant="primary", onClick, size="md", style={} }) => {
  const base = {
    display:"inline-flex", alignItems:"center", gap:6,
    padding: size==="sm" ? "7px 14px" : "10px 22px",
    borderRadius:10, fontFamily:"inherit",
    fontSize: size==="sm" ? 12 : 13, fontWeight:700,
    cursor:"pointer", border:"none", transition:"all .15s", ...style
  };
  const v = {
    primary: { background:G, color:"#fff", boxShadow:"0 2px 8px rgba(22,163,74,.25)" },
    ghost:   { background:"transparent", color:"#475569", border:"1px solid #e2e8f0" },
    outline: { background:"transparent", color:G, border:`1.5px solid ${G}` },
    dark:    { background:"rgba(255,255,255,0.12)", color:"#fff", border:"1px solid rgba(255,255,255,0.2)" },
  };
  return <button style={{...base,...v[variant]}} onClick={onClick}>{children}</button>;
};

const Avatar = ({ initials, size=36, color=G }) => (
  <div style={{ width:size, height:size, borderRadius:size*.28, flexShrink:0,
    background:`${color}18`, border:`1.5px solid ${color}35`,
    display:"flex", alignItems:"center", justifyContent:"center",
    fontSize:size*.34, fontWeight:800, color, fontFamily:"Space Grotesk, sans-serif" }}>
    {initials}
  </div>
);

// ─── AUTH FIELD (defined outside AuthModal to avoid remount on each keystroke) ─
const AField = ({ label, value, onChange, type="text", placeholder, required }) => (
  <div style={{ marginBottom:14 }}>
    <label style={{ display:"block", fontSize:11, fontWeight:700, color:"#64748b",
      textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:5 }}>
      {label}{required && <span style={{ color:"#dc2626" }}> *</span>}
    </label>
    <input type={type} value={value} onChange={e=>onChange(e.target.value)}
      placeholder={placeholder}
      style={{ width:"100%", padding:"10px 14px", borderRadius:9,
        border:"1px solid #e2e8f0", fontFamily:"inherit", fontSize:13,
        outline:"none", color:"#1e293b", background:"#f8fafc",
        transition:"border-color .15s" }}
      onFocus={e=>e.target.style.borderColor=G}
      onBlur={e=>e.target.style.borderColor="#e2e8f0"}
    />
  </div>
);

// ─── AUTH MODAL ───────────────────────────────────────────────────────────────
const AuthModal = ({ onClose, onLogin, defaultTab="login" }) => {
  const [authTab, setAuthTab] = useState(defaultTab);
  const [loginForm, setLoginForm] = useState({ email:"", password:"" });
  const [regForm, setRegForm]   = useState({ nombre:"", email:"", telefono:"", password:"", confirm:"" });
  const [error, setError]   = useState("");
  const [loading, setLoading] = useState(false);
  const [regOk, setRegOk]   = useState(false);

  const setLF = k => v => setLoginForm(f=>({...f,[k]:v}));
  const setRF = k => v => setRegForm(f=>({...f,[k]:v}));

  const handleLogin = () => {
    setError("");
    if (!loginForm.email || !loginForm.password) { setError("Completá todos los campos."); return; }
    setLoading(true);
    setTimeout(() => {
      setLoading(false);
      // Admin credentials
      if (loginForm.email === "admin@padelclub.com.ar" && loginForm.password === "admin123") {
        onLogin({ nombre:"Administrador", email:loginForm.email, role:"admin", avatar:"AD" });
        onClose();
        return;
      }
      // Check mock players
      const player = PLAYERS_DATA.find(p => p.email && p.email.toLowerCase() === loginForm.email.toLowerCase());
      if (player && loginForm.password.length >= 4) {
        onLogin({ nombre:player.nombre, email:loginForm.email, role:"jugador", avatar:player.avatar, playerId:player.id });
        onClose();
        return;
      }
      // Generic user
      if (loginForm.email.includes("@") && loginForm.password.length >= 4) {
        const initials = loginForm.email.substring(0,2).toUpperCase();
        onLogin({ nombre:loginForm.email.split("@")[0], email:loginForm.email, role:"jugador", avatar:initials });
        onClose();
        return;
      }
      setError("Email o contraseña incorrectos.");
    }, 700);
  };

  const handleRegister = () => {
    setError("");
    if (!regForm.nombre || !regForm.email || !regForm.password) { setError("Completá los campos requeridos."); return; }
    if (regForm.password !== regForm.confirm) { setError("Las contraseñas no coinciden."); return; }
    if (regForm.password.length < 6) { setError("La contraseña debe tener al menos 6 caracteres."); return; }
    setLoading(true);
    setTimeout(() => {
      setLoading(false);
      setRegOk(true);
    }, 800);
  };

  return (
    <div className="overlay-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="overlay-card" style={{ maxWidth:420 }}>
        {/* Header */}
        <div style={{ padding:"22px 24px 0",
          display:"flex", alignItems:"flex-start", justifyContent:"space-between" }}>
          <div>
            <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:16 }}>
              <div style={{ width:34, height:34, borderRadius:9, background:GL,
                border:`2px solid ${GB}`, display:"flex", alignItems:"center",
                justifyContent:"center", fontSize:16 }}>🎾</div>
              <div style={{ fontSize:15, fontWeight:800, color:"#0f172a",
                fontFamily:"Space Grotesk, sans-serif" }}>Club Pádel BA</div>
            </div>
            {/* Tabs */}
            <div style={{ display:"flex", gap:0, borderBottom:"2px solid #f1f5f9" }}>
              {[{id:"login",label:"Iniciar sesión"},{id:"register",label:"Registrarse"}].map(t=>(
                <button key={t.id} onClick={()=>{setAuthTab(t.id);setError("");}}
                  style={{ padding:"8px 18px", background:"none", border:"none",
                    borderBottom:`2px solid ${authTab===t.id?G:"transparent"}`,
                    color:authTab===t.id?G:"#94a3b8", fontFamily:"inherit",
                    fontSize:13, fontWeight:700, cursor:"pointer", marginBottom:-2,
                    transition:"color .12s" }}>
                  {t.label}
                </button>
              ))}
            </div>
          </div>
          <button onClick={onClose} style={{ background:"#f1f5f9", border:"none",
            color:"#64748b", width:30, height:30, borderRadius:8,
            cursor:"pointer", fontSize:13, flexShrink:0, marginTop:4 }}>✕</button>
        </div>

        <div style={{ padding:"20px 24px 24px" }}>
          {authTab === "login" ? (
            <div className="fade-in">
              <AField label="Email" value={loginForm.email} onChange={setLF("email")}
                type="email" placeholder="tu@email.com" required />
              <AField label="Contraseña" value={loginForm.password} onChange={setLF("password")}
                type="password" placeholder="••••••••" required />
              {error && <div style={{ fontSize:12, color:"#dc2626",
                background:"#fee2e2", padding:"8px 12px", borderRadius:8,
                marginBottom:14 }}>{error}</div>}
              <button onClick={handleLogin} disabled={loading}
                style={{ width:"100%", padding:"11px", borderRadius:10,
                  background:loading?"#86efac":G, color:"#fff", border:"none",
                  fontFamily:"inherit", fontSize:14, fontWeight:700,
                  cursor:loading?"not-allowed":"pointer",
                  boxShadow:"0 2px 10px rgba(22,163,74,.25)",
                  transition:"all .15s" }}>
                {loading ? "Ingresando…" : "Ingresar →"}
              </button>
              <div style={{ marginTop:14, padding:"12px 14px", background:"#f8fafc",
                borderRadius:10, border:"1px solid #e2e8f0", fontSize:11, color:"#94a3b8" }}>
                <div style={{ fontWeight:700, color:"#64748b", marginBottom:5 }}>Demo de acceso</div>
                <div>Admin: <code style={{color:"#334155"}}>admin@padelclub.com.ar</code> / <code style={{color:"#334155"}}>admin123</code></div>
                <div style={{marginTop:2}}>Jugador: cualquier email válido con contraseña ≥ 4 chars</div>
              </div>
              <div style={{ textAlign:"center", marginTop:14 }}>
                <span style={{ fontSize:12, color:"#94a3b8" }}>¿No tenés cuenta? </span>
                <button onClick={()=>setAuthTab("register")}
                  style={{ fontSize:12, color:G, fontWeight:700, background:"none",
                    border:"none", cursor:"pointer", fontFamily:"inherit" }}>
                  Registrate gratis
                </button>
              </div>
            </div>
          ) : regOk ? (
            <div style={{ textAlign:"center", padding:"8px 0 4px" }} className="fade-in">
              <div style={{ fontSize:52, marginBottom:14 }}>🎾</div>
              <h3 style={{ fontSize:17, fontWeight:800, color:"#0f172a",
                fontFamily:"Space Grotesk, sans-serif", marginBottom:8 }}>
                ¡Registro exitoso!
              </h3>
              <p style={{ fontSize:13, color:"#64748b", lineHeight:1.6, marginBottom:20 }}>
                Tu cuenta fue creada. Ya podés iniciar sesión con tu email y contraseña.
              </p>
              <button onClick={()=>{setRegOk(false);setAuthTab("login");setLoginForm({email:regForm.email,password:""});}}
                style={{ padding:"10px 28px", borderRadius:10, background:G,
                  color:"#fff", border:"none", fontFamily:"inherit",
                  fontSize:13, fontWeight:700, cursor:"pointer" }}>
                Ir al login →
              </button>
            </div>
          ) : (
            <div className="fade-in">
              <AField label="Nombre completo" value={regForm.nombre} onChange={setRF("nombre")}
                placeholder="Ej: Martín García" required />
              <AField label="Email" value={regForm.email} onChange={setRF("email")}
                type="email" placeholder="tu@email.com" required />
              <AField label="Teléfono" value={regForm.telefono} onChange={setRF("telefono")}
                placeholder="+54 9 11 1234-5678" />
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                <AField label="Contraseña" value={regForm.password} onChange={setRF("password")}
                  type="password" placeholder="Mín. 6 chars" required />
                <AField label="Repetir" value={regForm.confirm} onChange={setRF("confirm")}
                  type="password" placeholder="Repetir" required />
              </div>
              {error && <div style={{ fontSize:12, color:"#dc2626",
                background:"#fee2e2", padding:"8px 12px", borderRadius:8,
                marginBottom:14 }}>{error}</div>}
              <button onClick={handleRegister} disabled={loading}
                style={{ width:"100%", padding:"11px", borderRadius:10,
                  background:loading?"#86efac":G, color:"#fff", border:"none",
                  fontFamily:"inherit", fontSize:14, fontWeight:700,
                  cursor:loading?"not-allowed":"pointer",
                  boxShadow:"0 2px 10px rgba(22,163,74,.25)" }}>
                {loading ? "Registrando…" : "Crear cuenta →"}
              </button>
              <div style={{ textAlign:"center", marginTop:14 }}>
                <span style={{ fontSize:12, color:"#94a3b8" }}>¿Ya tenés cuenta? </span>
                <button onClick={()=>setAuthTab("login")}
                  style={{ fontSize:12, color:G, fontWeight:700, background:"none",
                    border:"none", cursor:"pointer", fontFamily:"inherit" }}>
                  Iniciá sesión
                </button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

// ─── USER MENU ────────────────────────────────────────────────────────────────
const UserMenu = ({ user, onLogout, onAdmin }) => {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    const handler = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, []);
  return (
    <div ref={ref} style={{ position:"relative" }}>
      <button onClick={()=>setOpen(o=>!o)}
        style={{ display:"flex", alignItems:"center", gap:8,
          padding:"6px 12px 6px 6px", borderRadius:10,
          background:open?"#f0fdf4":"#f8fafc",
          border:`1.5px solid ${open?GB:"#e2e8f0"}`,
          cursor:"pointer", transition:"all .15s" }}>
        <div style={{ width:28, height:28, borderRadius:8,
          background:`${G}18`, border:`1.5px solid ${G}35`,
          display:"flex", alignItems:"center", justifyContent:"center",
          fontSize:12, fontWeight:800, color:G,
          fontFamily:"Space Grotesk, sans-serif" }}>
          {user.avatar}
        </div>
        <span style={{ fontSize:12, fontWeight:600, color:"#334155",
          maxWidth:100, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}
          className="hide-sm">
          {user.nombre.split(" ")[0]}
        </span>
        <span style={{ fontSize:9, color:"#94a3b8" }}>▼</span>
      </button>
      {open && (
        <div style={{ position:"absolute", right:0, top:"calc(100% + 6px)",
          background:"#fff", borderRadius:12, border:"1px solid #e2e8f0",
          boxShadow:"0 8px 28px rgba(0,0,0,0.12)", minWidth:200,
          zIndex:300, overflow:"hidden" }} className="fade-in">
          <div style={{ padding:"14px 16px", borderBottom:"1px solid #f1f5f9" }}>
            <div style={{ fontSize:13, fontWeight:700, color:"#0f172a" }}>{user.nombre}</div>
            <div style={{ fontSize:11, color:"#94a3b8", marginTop:2 }}>{user.email}</div>
            {user.role==="admin" && (
              <span style={{ marginTop:6, display:"inline-block", padding:"2px 8px",
                borderRadius:20, fontSize:10, fontWeight:700,
                background:"#fef9c3", color:"#a16207" }}>Administrador</span>
            )}
          </div>
          {user.role==="admin" && (
            <button onClick={()=>{setOpen(false);onAdmin();}}
              style={{ width:"100%", padding:"10px 16px", background:"none",
                border:"none", textAlign:"left", fontFamily:"inherit",
                fontSize:13, fontWeight:600, color:G, cursor:"pointer",
                borderBottom:"1px solid #f1f5f9",
                transition:"background .12s" }}
              onMouseEnter={e=>e.target.style.background="#f0fdf4"}
              onMouseLeave={e=>e.target.style.background="none"}>
              Panel de admin →
            </button>
          )}
          <button onClick={()=>{setOpen(false);onLogout();}}
            style={{ width:"100%", padding:"10px 16px", background:"none",
              border:"none", textAlign:"left", fontFamily:"inherit",
              fontSize:13, color:"#dc2626", cursor:"pointer",
              transition:"background .12s" }}
            onMouseEnter={e=>e.target.style.background="#fff5f5"}
            onMouseLeave={e=>e.target.style.background="none"}>
            Cerrar sesión
          </button>
        </div>
      )}
    </div>
  );
};

// ─── HEADER ───────────────────────────────────────────────────────────────────
const NAV = [
  { id:"torneos",    label:"Torneos"   },
  { id:"cuadros",    label:"Cuadros"   },
  { id:"agenda",     label:"Agenda"    },
  { id:"ranking",    label:"Ranking"   },
  { id:"jugadores",  label:"Jugadores" },
];

const Header = ({ tab, setTab, onSearch, currentUser, onOpenAuth, onLogout }) => {
  const [q, setQ] = useState("");
  const handleSearch = (e) => {
    setQ(e.target.value);
    onSearch(e.target.value);
  };
  return (
    <header style={{ background:"#fff", borderBottom:"1px solid #e2e8f0",
      position:"sticky", top:0, zIndex:200,
      boxShadow:"0 1px 4px rgba(0,0,0,0.06)" }}>
      <div style={{ maxWidth:MAX, margin:"0 auto", padding:"0 24px" }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"13px 0 11px" }}>
          {/* Logo */}
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <div style={{ width:36, height:36, borderRadius:10, background:GL,
              border:`2px solid ${GB}`, display:"flex", alignItems:"center",
              justifyContent:"center", fontSize:18 }}>🎾</div>
            <div>
              <div style={{ fontSize:15, fontWeight:800, color:"#0f172a",
                fontFamily:"Space Grotesk, sans-serif", lineHeight:1.1 }}>
                Club Pádel BA
              </div>
              <div style={{ fontSize:10, color:"#94a3b8", fontWeight:500 }}>Portal público · Temporada 2026</div>
            </div>
          </div>

          {/* Search + CTA */}
          <div style={{ display:"flex", gap:8, alignItems:"center" }}>
            <div style={{ position:"relative" }} className="hide-sm">
              <input value={q} onChange={handleSearch}
                placeholder="Buscar jugador o torneo…"
                style={{ padding:"8px 14px 8px 36px", borderRadius:9,
                  border:"1px solid #e2e8f0", fontSize:13, outline:"none",
                  background:"#f8fafc", fontFamily:"inherit", width:220,
                  color:"#334155", transition:"border-color .15s" }}
                onFocus={e=>e.target.style.borderColor=G}
                onBlur={e=>e.target.style.borderColor="#e2e8f0"}
              />
              <span style={{ position:"absolute", left:11, top:"50%",
                transform:"translateY(-50%)", color:"#cbd5e1", fontSize:14 }}>🔍</span>
            </div>

            {currentUser ? (
              <UserMenu
                user={currentUser}
                onLogout={onLogout}
                onAdmin={()=>{ window.location.href="Padel Tournament.html"; }}
              />
            ) : (
              <div style={{ display:"flex", gap:6 }}>
                <button onClick={()=>onOpenAuth("login")}
                  style={{ padding:"8px 14px", borderRadius:9,
                    background:"transparent", color:"#475569",
                    border:"1px solid #e2e8f0", fontFamily:"inherit",

const PublicMatchCard = ({ partido }) => {
  const [hover, setHover] = useState(false);
  return (
    <div onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)}
      style={{ background:hover?"#f8fafc":"#fff", borderRadius:11,
        border:`1px solid ${partido.resultado ? "#bbf7d0" : "#e2e8f0"}`,
        overflow:"hidden", transition:"all .15s",
        boxShadow: hover ? "0 4px 14px rgba(0,0,0,0.08)" : "0 1px 3px rgba(0,0,0,0.05)" }}>
      {[partido.local, partido.visitante].map((equipo, i) => {
        const tbd = !equipo || equipo==="TBD";
        const win = equipo===partido.ganador && partido.ganador;
        return (
          <div key={i} style={{
            padding:"10px 14px",
            display:"flex", alignItems:"center", justifyContent:"space-between",
            borderBottom: i===0 ? "1px solid #f1f5f9" : "none",

            <div style={{ display:"flex", alignItems:"center", gap:7 }}>
              {win && <span style={{ fontSize:11 }}>🏆</span>}
              <span style={{ fontSize:13, fontWeight: win?700:400,
                color: tbd?"#cbd5e1" : win?"#15803d" : "#334155" }}>
                {tbd ? "Por definir" : equipo}
              </span>
            </div>
            {partido.resultado && !tbd && (
              <span style={{ fontSize:11, fontWeight:700,
                color: win ? G : "#cbd5e1", fontFamily:"Space Grotesk, sans-serif" }}>
                {win
                  ? partido.resultado.split(", ").map(s=>s.split("-")[0]).join("-")
                  : partido.resultado.split(", ").map(s=>s.split("-")[1]).join("-")}
              </span>
            )}
          </div>
        );
      })}
      {partido.hora && (
        <div style={{ padding:"5px 12px", background:"#f8fafc",
          display:"flex", gap:10 }}>
          <span style={{ fontSize:10, color:"#94a3b8" }}>⏰ {partido.hora}</span>
          <span style={{ fontSize:10, color:"#94a3b8" }}>📍 {partido.cancha}</span>

      )}

  );
};

            </div>
            {!submitted && <div style={{ fontSize:12, color:"#94a3b8", marginTop:2 }}>
              {torneo?.nombre}
            </div>}
          </div>
          <button onClick={onClose} style={{ background:"#f1f5f9", border:"none",
            color:"#64748b", width:30, height:30, borderRadius:8,
            cursor:"pointer", fontSize:13 }}>✕</button>
        </div>

        {/* Progress */}
        {!submitted && (
          <div style={{ padding:"14px 24px 0", display:"flex", gap:6 }}>
            {["Datos","Categoría","Confirmación"].map((s,i)=>(
              <div key={i} style={{ flex:1, display:"flex", flexDirection:"column", gap:4 }}>
                <div style={{ height:3, borderRadius:3,
                  background: step>i+1?G:step===i+1?"#bbf7d0":"#e2e8f0" }} />
                <span style={{ fontSize:10, fontWeight:600,
                  color:step===i+1?G:step>i+1?"#94a3b8":"#cbd5e1",
                  textTransform:"uppercase", letterSpacing:"0.06em" }}>{s}</span>
              </div>
            ))}
          </div>
        )}

        <div style={{ padding:"20px 24px", maxHeight:380, overflowY:"auto" }}>
          {submitted ? (
            <div style={{ textAlign:"center", padding:"16px 0 8px" }}>
              <div style={{ fontSize:56, marginBottom:16 }}>✅</div>
              <h3 style={{ fontSize:18, fontWeight:800, color:"#0f172a",
                fontFamily:"Space Grotesk, sans-serif", marginBottom:8 }}>
                ¡Solicitud recibida!
              </h3>
              <p style={{ fontSize:13, color:"#64748b", lineHeight:1.6, marginBottom:20 }}>
                Tu solicitud de inscripción para <strong>{form.categoria}</strong> fue enviada.<br/>
                El organizador la revisará y recibirás confirmación en <strong>24–48hs</strong> al email registrado.
              </p>
              <div style={{ background:GL, borderRadius:12, border:"1px solid #bbf7d0",
                padding:"14px 16px", textAlign:"left", marginBottom:0 }}>
                <div style={{ fontSize:12, fontWeight:700, color:GD, marginBottom:8 }}>Resumen de la solicitud</div>
                {[
                  {label:"Pareja", value:`${form.jugador1nombre} / ${form.jugador2nombre}`},
                  {label:"Categoría", value:form.categoria},
                  {label:"Torneo", value:torneo?.nombre},
                ].map(f=>(
                  <div key={f.label} style={{ display:"flex", justifyContent:"space-between",
                    fontSize:12, marginBottom:4 }}>
                    <span style={{ color:"#64748b" }}>{f.label}</span>
                    <span style={{ fontWeight:600, color:"#0f172a" }}>{f.value}</span>
                  </div>
                ))}
              </div>
            </div>
          ) : step===1 ? (
            <div>
              <div style={{ fontSize:12, color:"#64748b", marginBottom:16 }}>
                Ingresá los datos de ambos jugadores de la pareja
              </div>
              <div style={{ padding:"14px 16px", background:"#f8fafc",
                borderRadius:10, border:"1px solid #e2e8f0", marginBottom:18 }}>
                <div style={{ fontSize:12, fontWeight:700, color:"#334155", marginBottom:10 }}>
                  Jugador 1
                </div>
                <IField label="Nombre completo *" k="jugador1nombre" placeholder="Ej: Martín García" />
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                  <IField label="Email *" k="jugador1email" type="email" placeholder="email@mail.com" />
                  <IField label="Teléfono" k="jugador1telefono" placeholder="+54 9 11..." />
                </div>
              </div>
              <div style={{ padding:"14px 16px", background:"#f8fafc",
                borderRadius:10, border:"1px solid #e2e8f0" }}>
                <div style={{ fontSize:12, fontWeight:700, color:"#334155", marginBottom:10 }}>
                  Jugador 2
                </div>
                <IField label="Nombre completo *" k="jugador2nombre" placeholder="Ej: Carlos López" />
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                  <IField label="Email *" k="jugador2email" type="email" placeholder="email@mail.com" />
                  <IField label="Teléfono" k="jugador2telefono" placeholder="+54 9 11..." />
                </div>
              </div>
            </div>
          ) : step===2 ? (
            <div>
              <div style={{ fontSize:12, color:"#64748b", marginBottom:16 }}>
                Seleccioná la categoría en la que quieren participar
              </div>
              {cats.length===0 ? (
                <div style={{ textAlign:"center", padding:"32px 0", color:"#94a3b8" }}>
                  <div style={{ fontSize:32, marginBottom:8 }}>😔</div>
                  <div>No hay categorías con cupo disponible</div>
                </div>
              ) : (
                <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                  {cats.map(c=>(
                    <div key={c.id} onClick={()=>setF("categoria")(c.nombre)}
                      style={{ padding:"14px 16px", borderRadius:10, cursor:"pointer",
                        border:`2px solid ${form.categoria===c.nombre?G:"#e2e8f0"}`,
                        background:form.categoria===c.nombre?GL:"#fff",
                        transition:"all .12s" }}>
                      <div style={{ display:"flex", justifyContent:"space-between",
                        alignItems:"center", marginBottom:8 }}>
                        <span style={{ fontSize:14, fontWeight:700,
                          color:form.categoria===c.nombre?GD:"#0f172a",
                          fontFamily:"Space Grotesk, sans-serif" }}>{c.nombre}</span>
                        <div style={{ width:20, height:20, borderRadius:"50%",
                          border:`2px solid ${form.categoria===c.nombre?G:"#e2e8f0"}`,
                          background:form.categoria===c.nombre?G:"transparent",
                          display:"flex", alignItems:"center",
                          justifyContent:"center", fontSize:11, color:"#fff" }}>
                          {form.categoria===c.nombre?"✓":""}
                        </div>
                      </div>
                      <Progress value={c.inscriptos} max={c.cupo} h={4} />
                      <div style={{ fontSize:11, color:"#94a3b8", marginTop:6 }}>
                        {c.cupo-c.inscriptos} lugares disponibles
                      </div>
                    </div>
                  ))}
                </div>
              )}
              <div style={{ marginTop:16 }}>
                <label style={{ display:"block", fontSize:11, fontWeight:700, color:"#64748b",
                  textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:6 }}>
                  Mensaje al organizador (opcional)
                </label>
                <textarea value={form.mensaje} onChange={e=>setF("mensaje")(e.target.value)}
                  rows={2} placeholder="Algún comentario o aclaración..."
                  style={{ width:"100%", padding:"9px 14px", borderRadius:8,
                    border:"1px solid #e2e8f0", fontFamily:"inherit", fontSize:13,
                    outline:"none", resize:"none", color:"#1e293b" }} />
              </div>
            </div>
          ) : (
            <div>
              <div style={{ fontSize:12, color:"#64748b", marginBottom:16 }}>
                Revisá los datos antes de enviar
              </div>
              {[
                {label:"Jugador 1", value:`${form.jugador1nombre} · ${form.jugador1email}`},
                {label:"Jugador 2", value:`${form.jugador2nombre} · ${form.jugador2email}`},
                {label:"Categoría", value:form.categoria},
                {label:"Torneo", value:torneo?.nombre},
              ].map(f=>(
                <div key={f.label} style={{ display:"flex", justifyContent:"space-between",
                  padding:"11px 0", borderBottom:"1px solid #f1f5f9",
                  alignItems:"flex-start", gap:12 }}>
                  <span style={{ fontSize:12, color:"#94a3b8", flexShrink:0 }}>{f.label}</span>
                  <span style={{ fontSize:13, fontWeight:600, color:"#0f172a",
                    textAlign:"right" }}>{f.value}</span>
                </div>
              ))}
              <div style={{ marginTop:16, padding:14, background:GL,
                borderRadius:10, border:"1px solid #bbf7d0",
                fontSize:12, color:"#4b7a5c", lineHeight:1.5 }}>
                ℹ El organizador revisará tu solicitud y te notificará por email en 24–48hs hábiles.
              </div>
            </div>
          )}
        </div>

        {/* Footer */}
        <div style={{ padding:"14px 24px", borderTop:"1px solid #f1f5f9",
          display:"flex", justifyContent:"flex-end", gap:8 }}>
          {submitted ? (
            <Btn variant="primary" onClick={onClose} style={{ minWidth:120 }}>Cerrar</Btn>
          ) : (
            <>
              <Btn variant="ghost" onClick={step>1?()=>setStep(s=>s-1):onClose}>
                {step>1?"← Atrás":"Cancelar"}
              </Btn>
              {step<3
                ? <Btn variant="primary"
                    onClick={()=>setStep(s=>s+1)}
                    style={{ opacity:(step===1&&!canNext1)||(step===2&&!canNext2)?.5:1,
                      pointerEvents:(step===1&&!canNext1)||(step===2&&!canNext2)?"none":"auto" }}>
                    Siguiente →
                  </Btn>
                : <Btn variant="primary" onClick={()=>setSubmitted(true)}>
                    ✍ Enviar solicitud
                  </Btn>
              }
            </>
          )}
        </div>
      </div>
    </div>
  );
};

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState(()=>localStorage.getItem("portal_tab_v2")||"torneos");
  const [selectedTorneo, setSelectedTorneo] = useState(null);
  const [playerModal, setPlayerModal] = useState(null);
  const [inscripcionModal, setInscripcionModal] = useState(null);
  const [searchQuery, setSearchQuery] = useState("");
  const [authModal, setAuthModal] = useState(null); // "login" | "register" | null
  const [currentUser, setCurrentUser] = useState(()=>{
    try { const u = localStorage.getItem("portal_user_v2"); return u ? JSON.parse(u) : null; } catch { return null; }
  });

  useEffect(()=>{ localStorage.setItem("portal_tab_v2", tab); }, [tab]);
  useEffect(()=>{
    if (currentUser) localStorage.setItem("portal_user_v2", JSON.stringify(currentUser));
    else localStorage.removeItem("portal_user_v2");
  }, [currentUser]);

  const handleTabChange = t => { setTab(t); setSelectedTorneo(null); };

  const handleSearch = q => {
    setSearchQuery(q);
    if (q.length > 1) { setTab("jugadores"); setSelectedTorneo(null); }
  };

  const handleInscribirse = torneo => {
    if (!currentUser) { setAuthModal("login"); return; }
    setInscripcionModal(torneo);
  };

  const handleLogout = () => { setCurrentUser(null); };

  return (
    <div style={{ minHeight:"100vh", background:"#f1f5f9" }}>
      <LiveTicker />
      <Header tab={tab} setTab={handleTabChange} onSearch={handleSearch}
        currentUser={currentUser}
        onOpenAuth={setAuthModal}
        onLogout={handleLogout}
      />

      {/* Modals */}
      {authModal && (
        <AuthModal
          defaultTab={authModal}
          onClose={()=>setAuthModal(null)}
          onLogin={user=>setCurrentUser(user)}
        />
      )}
      {playerModal && <PlayerModal player={playerModal} onClose={()=>setPlayerModal(null)} />}
      {inscripcionModal && (
        <InscripcionModal torneo={inscripcionModal} onClose={()=>setInscripcionModal(null)} />
      )}

      <div className="fade-up" key={tab+(selectedTorneo?.id||"")}>
        {tab==="torneos" && !selectedTorneo && (
          <TorneosTab onSelectTorneo={t=>{setSelectedTorneo(t);}} />
        )}
        {tab==="torneos" && selectedTorneo && (
          <TorneoDetalle
            torneo={selectedTorneo}
            onBack={()=>setSelectedTorneo(null)}
            onInscribirse={handleInscribirse}
          />
        )}
        {tab==="cuadros"    && <CuadrosTab />}
        {tab==="agenda"     && <AgendaTab />}
        {tab==="ranking"    && <RankingTab onPlayerClick={setPlayerModal} />}
        {tab==="jugadores"  && <JugadoresTab onPlayerClick={setPlayerModal} searchQuery={searchQuery} />}
      </div>

      <footer style={{ borderTop:"1px solid #e2e8f0", padding:"24px 20px",
        background:"#fff", marginTop:8 }}>
        <div style={{ maxWidth:MAX, margin:"0 auto",
          display:"flex", justifyContent:"space-between", alignItems:"center",
          flexWrap:"wrap", gap:12 }}>
          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
            <span style={{ fontSize:20 }}>🎾</span>
            <div>
              <div style={{ fontSize:13, fontWeight:700, color:"#0f172a",
                fontFamily:"Space Grotesk, sans-serif" }}>
                Club Pádel Buenos Aires
              </div>
              <div style={{ fontSize:11, color:"#94a3b8" }}>
                Av. del Libertador 5200, CABA · info@padelclub.com.ar
              </div>
            </div>
          </div>
          <span style={{ fontSize:11, color:"#cbd5e1" }}>
            Powered by PadelPro · 2026
          </span>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
